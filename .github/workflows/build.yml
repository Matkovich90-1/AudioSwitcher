name: Build Cross-Platform Audio Switcher
on: [push]

# Force the runner to use Node 24 for all actions to clear deprecation warnings
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # --- WINDOWS BUILD ---
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6 # Updated to v6 for Node 24 support
        with:
          python-version: '3.11'
      - name: Build EXE
        run: |
          pip install pyinstaller
          pyinstaller --onefile --noconsole --icon="app_icon.ico" --add-data "nircmd.exe;." --add-data "app_icon.ico;." audiochanger.py
      - name: Create Installer
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.2
        with:
          path: installer.iss
      - name: Upload Windows
        uses: actions/upload-artifact@v4
        with:
          name: Audio-Switcher-Windows
          path: dist/AudioSwitcherInstaller.exe

  # --- DEBIAN/LINUX BUILD ---
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6 # Updated to v6 for Node 24 support
        with:
          python-version: '3.11'
      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk
          pip install pyinstaller
      - name: Build Binary
        run: pyinstaller --onefile --noconsole audiochanger.py
      - name: Upload Linux Binary
        uses: actions/upload-artifact@v4
        with:
          name: Audio-Switcher-Linux
          path: dist/audiochanger
