name: Build Cross-Platform Audio Switcher
on: [push]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # --- WINDOWS BUILD ---
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4.2.2 # Check for v5 if available
      - uses: actions/setup-python@v6 
        with:
          python-version: '3.11'
      - name: Build EXE
        run: |
          pip install pyinstaller
          pyinstaller --onefile --noconsole --icon="app_icon.ico" --add-data "nircmd.exe;." --add-data "app_icon.ico;." audiochanger.py
      
      # Switched to a more frequently updated Inno Setup action
      - name: Create Installer
        uses: jack-of-all-trades/inno-setup-action@v1.0.0
        with:
          path: installer.iss

      - name: Upload Windows
        uses: actions/upload-artifact@v6 # Upgrade to v6 for native Node 24 support
        with:
          name: Audio-Switcher-Windows
          path: dist/AudioSwitcherInstaller.exe

  # --- DEBIAN/LINUX BUILD ---
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-python@v6 
        with:
          python-version: '3.11'
      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk
          pip install pyinstaller
      - name: Build Binary
        run: pyinstaller --onefile --noconsole audiochanger.py
      - name: Upload Linux Binary
        uses: actions/upload-artifact@v6 # Upgrade to v6 for native Node 24 support
        with:
          name: Audio-Switcher-Linux
          path: dist/audiochanger
