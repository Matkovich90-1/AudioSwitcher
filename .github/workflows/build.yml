name: Build Windows Audio Switcher
on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build EXE with NirCmd bundled
        # We use audiochanger.py here because that is your filename
        run: pyinstaller --onefile --noconsole --add-data "nircmd.exe;." audiochanger.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Windows-Audio-Switcher
          path: dist/*.exe

