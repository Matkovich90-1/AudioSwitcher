name: Build Windows Audio Switcher
on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build EXE with NirCmd bundled
        # --add-data "nircmd.exe;." includes nircmd inside the exe
        # --noconsole hides the black terminal window
        run: pyinstaller --onefile --noconsole --add-data "nircmd.exe;." audio_switcher.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Windows-Audio-Switcher
          path: dist/*.exe
