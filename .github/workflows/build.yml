name: Build Windows Audio Switcher
on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install pyinstaller pycaw comtypes

      - name: Build EXE with PyInstaller
        # This creates the raw exe inside the 'dist' folder
        run: pyinstaller --onefile --noconsole --add-data "nircmd.exe;." audiochanger.py

      - name: Build Installer (Inno Setup)
        # This turns that exe into a Setup Wizard
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.2
        with:
          path: installer.iss

      - name: Upload Installer Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Audio-Switcher-Setup
          path: dist/AudioSwitcherInstaller.exe
